<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice Roller</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-classic" data-mode="light">
  <div class="app">

    <!-- Header -->
    <header class="header">
      <h1 class="logo">Dice Roller</h1>
      <div class="controls">
        <div class="theme-picker" id="themePicker">
          <button class="theme-btn active" data-theme="classic" title="Classic">Classic</button>
          <button class="theme-btn" data-theme="neon" title="Neon">Neon</button>
          <button class="theme-btn" data-theme="wood" title="Wood">Wood</button>
          <button class="theme-btn" data-theme="ice" title="Ice">Ice</button>
          <button class="theme-btn" data-theme="obsidian" title="Obsidian">Obsidian</button>
        </div>
        <button class="icon-btn" id="modeToggle" title="Toggle dark/light mode">
          <span class="mode-icon">☀️</span>
        </button>
      </div>
    </header>

    <!-- Dice Count Selector -->
    <div class="dice-count-row">
      <span class="label">Dice</span>
      <div class="dice-count-btns">
        <button class="count-btn active" data-count="1">1</button>
        <button class="count-btn" data-count="2">2</button>
        <button class="count-btn" data-count="3">3</button>
        <button class="count-btn" data-count="4">4</button>
        <button class="count-btn" data-count="5">5</button>
        <button class="count-btn" data-count="6">6</button>
      </div>
    </div>

    <!-- Stage -->
    <main class="stage">
      <div class="dice-tray" id="diceTray"></div>
    </main>

    <!-- Total -->
    <div class="result-row" id="resultRow">
      <span class="result-label">Total</span>
      <span class="result-value" id="totalValue">–</span>
    </div>

    <!-- Roll Button -->
    <div class="roll-row">
      <button class="roll-btn" id="rollBtn">Roll</button>
    </div>

    <!-- History -->
    <div class="history-section">
      <div class="history-header">
        <span class="label">History</span>
        <button class="clear-btn" id="clearHistory">Clear</button>
      </div>
      <ul class="history-list" id="historyList">
        <li class="history-empty">No rolls yet</li>
      </ul>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
